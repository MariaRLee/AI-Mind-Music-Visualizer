<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101827">
  <meta name="description" content="AI-Mind Music Visualizer：在本機瀏覽器中播放與視覺化腦波音樂，不上傳、不儲存、不追蹤。">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; media-src 'self' blob: data:; connect-src 'none'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
  <title>AI-Mind Music Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">AI-Mind Care</p>
        <h1 data-i18n="title">腦波音樂視覺化</h1>
        <p class="subtitle" data-i18n="subtitle">
          讓腦波音樂化為星光、療癒波浪與綻放光影。
        </p>
      </div>
      <button id="languageButton" class="ghost-button compact" type="button"
              aria-label="Switch language">EN</button>
    </header>

    <section class="privacy-card" aria-label="Privacy information">
      <span class="privacy-icon" aria-hidden="true">🔒</span>
      <div>
        <strong data-i18n="privacyTitle">本機隱私模式</strong>
        <p data-i18n="privacyText">
          音樂只在您的瀏覽器中播放與分析，不會上傳、儲存或提供給第三方。
        </p>
      </div>
    </section>

    <section class="control-panel" aria-label="Music and visualization controls">
      <div class="file-area">
        <label class="file-button" for="musicFile">
          <span aria-hidden="true">🎵</span>
          <span data-i18n="chooseMusic">選擇本機腦波音樂</span>
        </label>
        <input id="musicFile" type="file"
               accept="audio/mpeg,audio/wav,audio/x-wav,audio/mp4,audio/aac,audio/ogg,.mp3,.wav,.m4a,.aac,.ogg">
        <div>
          <p id="fileName" class="file-name" data-i18n="noFile">尚未選擇音樂</p>
          <p class="helper" data-i18n="fileHelp">支援 MP3、WAV、M4A、AAC、OGG；建議小於 100 MB。</p>
        </div>
      </div>

      <div class="controls-grid">
        <label class="field">
          <span data-i18n="visualMode">視覺模式</span>
          <select id="visualMode">
            <option value="stars" data-i18n="stars">星光流動</option>
            <option value="waves" data-i18n="waves">療癒波浪</option>
            <option value="bloom" data-i18n="bloom">綻放光影</option>
          </select>
        </label>

        <label class="field">
          <span>
            <span data-i18n="emotion">情緒值</span>
            <output id="emotionValue" for="emotionRange">0</output>
          </span>
          <input id="emotionRange" type="range" min="-6" max="6" step="1" value="0">
          <span id="emotionName" class="field-note">平衡・白色桔梗</span>
        </label>

        <label class="field">
          <span>
            <span data-i18n="sensitivity">動畫靈敏度</span>
            <output id="sensitivityValue" for="sensitivityRange">100%</output>
          </span>
          <input id="sensitivityRange" type="range" min="60" max="180" step="10" value="100">
          <span class="field-note" data-i18n="sensitivityHelp">音樂較柔和時可提高靈敏度。</span>
        </label>
      </div>

      <div class="transport">
        <button id="playButton" class="primary-button" type="button" disabled>
          <span aria-hidden="true">▶</span>
          <span data-i18n="play">播放</span>
        </button>
        <button id="restartButton" class="secondary-button" type="button" disabled>
          <span aria-hidden="true">↺</span>
          <span data-i18n="restart">重新開始</span>
        </button>
        <button id="fullscreenButton" class="secondary-button" type="button">
          <span aria-hidden="true">⛶</span>
          <span data-i18n="fullscreen">全螢幕</span>
        </button>
      </div>

      <audio id="audioPlayer" preload="metadata"></audio>
      <div class="progress-row">
        <span id="currentTime">0:00</span>
        <input id="seekRange" type="range" min="0" max="1000" step="1" value="0"
               aria-label="Playback position" disabled>
        <span id="duration">0:00</span>
      </div>

      <p id="statusMessage" class="status" role="status" aria-live="polite"
         data-i18n="statusReady">請選擇您有權使用的音樂檔案。</p>
    </section>

    <section id="visualStage" class="visual-stage" aria-label="Music visualization">
      <canvas id="visualizerCanvas"></canvas>
      <div class="stage-overlay">
        <div class="brand-mark">
          <span>AI-Mind</span>
          <small data-i18n="visualizer">Music Visualizer</small>
        </div>
        <div id="stageHint" class="stage-hint" data-i18n="stageHint">
          選擇音樂後，畫面將隨聲音即時變化
        </div>
      </div>
    </section>

    <footer>
      <p data-i18n="footer">
        Local processing · No upload · No storage · No tracking
      </p>
    </footer>
  </main>

  <script src="visualizer.js" defer></script>
</body>
</html>
